# setup.cfg
[flake8]
max-line-length = 100
exclude         =
    venv,
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info
ignore          =
    E501,
    W503,
    E203,
    W504
per-file-ignores =
    tests/*: S101, ANN

[mypy]
python_version         = 3.11
warn_return_any        = true
warn_unused_configs    = true
ignore_missing_imports = true
exclude                = venv/

[isort]
profile     = black
line_length = 100
known_first_party =
    config,
    core,
    scrapers,
    nlp,
    db,
    analytics

[coverage:run]
source   = .
omit     =
    venv/*,
    tests/*,
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    \.\.\.$